name: Build installers (dev channel)

# Dev channel: on every push to main, build UNSIGNED installers for macOS,
# Windows and Linux and publish them to a single rolling "latest" prerelease.
#   macOS   -> .pkg (built with productbuild from the universal .app) + .dmg
#   Windows -> .msi + NSIS .exe
#   Linux   -> .AppImage + .deb + .rpm
#
# This channel is for testers grabbing the newest main build. It is intentionally
# unsigned and produces NO auto-update artifacts. Signed, notarized, per-version
# releases that the in-app updater consumes are built by release.yml on `v*` tags.

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Cancel superseded runs on the same branch to save CI minutes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # needed to publish the rolling "latest" release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon runner; build a universal binary so one installer
          # runs on both Intel and Apple Silicon Macs.
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri_args: "--target universal-apple-darwin"
          # ubuntu-22.04 links against an older glibc -> AppImage runs on more distros.
          - platform: ubuntu-22.04
            rust_targets: ""
            tauri_args: ""
          - platform: windows-latest
            rust_targets: ""
            tauri_args: ""

    runs-on: ${{ matrix.platform }}
    name: build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app + publish to rolling "latest" prerelease
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: latest
          releaseName: "Dev build (latest main)"
          releaseBody: |
            Rolling, UNSIGNED installers for the newest `main` commit (dev channel).
            Gatekeeper/SmartScreen will warn on first launch. For signed, updatable
            builds use a tagged release.
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: false
          args: ${{ matrix.tauri_args }}

      # Tauri has no native .pkg target, so wrap the universal .app with
      # productbuild and attach it to the same rolling release.
      - name: Build and attach macOS .pkg
        if: runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          bundle_dir="src-tauri/target/universal-apple-darwin/release/bundle/macos"
          app_path="$(find "$bundle_dir" -maxdepth 1 -name '*.app' | head -n1)"
          version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          out="$bundle_dir/InterlinedList Offline_${version}_universal.pkg"
          echo "Wrapping $app_path -> $out"
          productbuild --component "$app_path" /Applications "$out"
          gh release upload latest "$out" --clobber --repo "$GITHUB_REPOSITORY"

      # Also keep per-run installers as workflow artifacts (handy for debugging
      # and guaranteed downloads even independent of the release).
      - name: Collect installers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p installers
          shopt -s nullglob
          cp -f \
            src-tauri/target/release/bundle/msi/*.msi \
            src-tauri/target/release/bundle/nsis/*.exe \
            src-tauri/target/release/bundle/appimage/*.AppImage \
            src-tauri/target/release/bundle/deb/*.deb \
            src-tauri/target/release/bundle/rpm/*.rpm \
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg \
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.pkg \
            installers/ 2>/dev/null || true
          echo "Collected:"
          ls -la installers/

      - name: Upload installers artifact
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}
          path: installers/*
          if-no-files-found: error
          retention-days: 30
