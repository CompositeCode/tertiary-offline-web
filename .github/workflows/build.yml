name: Build installers

# Build deployable installers for macOS, Windows and Linux on every push to main,
# and publish them to a single rolling "latest" prerelease.
#   macOS   -> .pkg (built with productbuild from the universal .app) + .dmg
#   Windows -> .msi + NSIS .exe
#   Linux   -> .AppImage + .deb + .rpm
#
# Auto-update (Tauri updater, GitHub Releases channel):
#   When the repo secret TAURI_SIGNING_PRIVATE_KEY is present, the build also
#   produces SIGNED updater artifacts and a `latest.json` manifest, uploaded to
#   the same "latest" release. The app's updater endpoint points at
#   https://github.com/CompositeCode/tertiary-offline-web/releases/download/latest/latest.json
#   Without that secret, the build still succeeds and publishes installers — it
#   just skips the updater artifacts (so main never breaks before the key is set).
#
# NOTE: OS installers are UNSIGNED (Gatekeeper / SmartScreen warn on first launch).
# Code signing is a separate follow-up — see the note at the bottom of this file.

on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Cancel superseded runs on the same branch to save CI minutes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # needed to publish the rolling "latest" release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon runner; build a universal binary so one installer
          # runs on both Intel and Apple Silicon Macs.
          - platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri_args: "--target universal-apple-darwin"
          # ubuntu-22.04 links against an older glibc -> AppImage runs on more distros.
          - platform: ubuntu-22.04
            rust_targets: ""
            tauri_args: ""
          - platform: windows-latest
            rust_targets: ""
            tauri_args: ""

    runs-on: ${{ matrix.platform }}
    name: build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      # Only produce (signed) updater artifacts when the signing key exists.
      # Keeps the build green before the secret is configured.
      - name: Detect updater signing key
        id: signing
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "$SIGNING_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Updater signing key present -> updater artifacts + latest.json will be produced."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "No TAURI_SIGNING_PRIVATE_KEY secret -> building installers only (no auto-update artifacts)."
          fi

      - name: Build Tauri app + publish to "latest" release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: latest
          releaseName: "Latest build (main)"
          releaseBody: |
            Automated installers for the latest `main` commit. OS packages are
            unsigned (Gatekeeper/SmartScreen will warn on first launch). When
            configured, in-app updates are verified with the Tauri updater key.
          releaseDraft: false
          prerelease: true
          # latest.json is only meaningful when we produced signed updater artifacts.
          includeUpdaterJson: ${{ steps.signing.outputs.enabled == 'true' }}
          # Append the updater-artifact overlay only when the signing key is present.
          args: "${{ matrix.tauri_args }} ${{ steps.signing.outputs.enabled == 'true' && '--config src-tauri/updater.conf.json' || '' }}"

      # Tauri has no native .pkg target, so wrap the universal .app with
      # productbuild and attach it to the same "latest" release.
      - name: Build and attach macOS .pkg
        if: runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          bundle_dir="src-tauri/target/universal-apple-darwin/release/bundle/macos"
          app_path="$(find "$bundle_dir" -maxdepth 1 -name '*.app' | head -n1)"
          version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          out="$bundle_dir/InterlinedList Offline_${version}_universal.pkg"
          echo "Wrapping $app_path -> $out"
          productbuild --component "$app_path" /Applications "$out"
          gh release upload latest "$out" --clobber --repo "$GITHUB_REPOSITORY"

      # Also keep per-run installers as workflow artifacts (handy for debugging
      # and guaranteed downloads even independent of the release).
      - name: Collect installers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p installers
          shopt -s nullglob
          cp -f \
            src-tauri/target/release/bundle/msi/*.msi \
            src-tauri/target/release/bundle/nsis/*.exe \
            src-tauri/target/release/bundle/appimage/*.AppImage \
            src-tauri/target/release/bundle/deb/*.deb \
            src-tauri/target/release/bundle/rpm/*.rpm \
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg \
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.pkg \
            installers/ 2>/dev/null || true
          echo "Collected:"
          ls -la installers/

      - name: Upload installers artifact
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.platform }}
          path: installers/*
          if-no-files-found: error
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# Enabling auto-update (one-time):
#   1. A Tauri updater keypair has been generated; the PUBLIC key is committed in
#      src-tauri/tauri.conf.json (plugins.updater.pubkey).
#   2. Add the matching PRIVATE key as repo secrets so CI can sign updates:
#        gh secret set TAURI_SIGNING_PRIVATE_KEY < <private-key-file>
#        gh secret set TAURI_SIGNING_PRIVATE_KEY_PASSWORD --body ""   # empty = no password
#      (or via GitHub → Settings → Secrets and variables → Actions)
#   Once set, the next push to main publishes signed updater artifacts + latest.json.
#
# OS code signing (separate follow-up, removes Gatekeeper/SmartScreen warnings):
#   macOS  — secrets APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
#            APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID;
#            sign the .pkg with `productsign --sign "Developer ID Installer: ..."`.
#   Windows — secrets WINDOWS_CERTIFICATE / WINDOWS_CERTIFICATE_PASSWORD and set
#            bundle.windows.certificateThumbprint in tauri.conf.json.
# ─────────────────────────────────────────────────────────────────────────────
