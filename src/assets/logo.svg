<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32"
     role="img" aria-label="InterlinedList">
  <!-- Faithful approximation of the interlinedlist.com favicon mark.
       Derived from interlinedlist.com on 2026-07-15 (favicon.svg) — replace with
       official asset pack when provided. The real mark is a stylized "IL"
       monogram built from stacked list rows + a link/loop; this is a clean redraw
       in the confirmed brand colors. -->
  <!-- Teal "L": vertical stem + three list rows (the "list" strokes) -->
  <g fill="none" stroke="#184860" stroke-width="2.6" stroke-linecap="round">
    <line x1="6.5" y1="7" x2="6.5" y2="25"/>
    <line x1="6.5" y1="9.5"  x2="18" y2="9.5"/>
    <line x1="6.5" y1="16"   x2="15" y2="16"/>
    <line x1="6.5" y1="22.5" x2="15" y2="22.5"/>
  </g>
  <!-- Green interlink loop tying the rows together (the "interlinked" motion) -->
  <path d="M18.5 8.5 a6 6 0 0 1 6 6 v3 a6 6 0 0 1 -6 6 h-2"
        fill="none" stroke="#2fa877" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Amber node accent -->
  <circle cx="24.5" cy="16" r="2.1" fill="#f0a830"/>
</svg>
